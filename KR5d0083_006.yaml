front:
  text: 清庵瑩蟾子語録卷之六卑十
  hash: sha256:10bf3f878eb6079fe9c1c958835a8e0c4c5027ee9b514dabd0bae4e26d0ff305
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0083_HFL_006-001a, image: hfl/0729/0729-124.png}
body:
  text: 門弟子損庵蔡志頥編黃中解惑師曰前代祖師高真上聖有無上正真之道留傳在世度人公還知否定庵曰弟子初進玄門至愚且蠢蒙師收留千載之幸也無上正真之道誠未知之望師開發師曰無上正真之道者無上可上玄之又玄無象可象自然而然至極至妙之謂也聖人强名曰道自古上仙皆由此處了達未有不由是而修證者聖師口口歷代心心所傳所授金丹之㫖乃無上正真之妙道也定庵曰無上正真之妙喻為金丹其理云何師曰金者堅也丹者圓也釋氏喻之為圓覺儒家喻之為太極太極初非别物只是本來一靈而已本來真性永劫不壞如金之堅如丹之圓愈煉愈明釋氏曰此者真如也儒家曰此者太極也吾道曰此者乃金丹也體同名異易曰易有太極是生兩儀太極者虛無自然之謂也兩儀一陰一陽也天地也人生於天地之間是謂三才之道一身備矣太極者元神也兩儀者身心也以丹道言之太極者丹之母也兩儀者真鉛真汞也所謂鉛汞者非水銀朱砂硫黃黑錫草木之類亦非精津涕唾心腎氣血乃身中元精心中元神身心不動精氣凝結喻之曰丹所謂丹者丹身也此真性也丹中取出者謂之丹成也所謂丹者非假外物而造作由所生之本而成正真也世鮮知之今之修丹之士多不得正傳皆是向外尋求隨邪背正所以學者多而成者少或煉五金八石或煉三避五假或煉雲霞外氣或煉日月精華或採星曜之光或想空中丸塊而成丹者或想丹田有物而為丹或肘後飛金精或存想眉間或還精補腦或運氣歸臍乃至服穢吞津納新吐故八段錦三字法搖夾脊絞轆轤閉尾閭守臍蒂採天癸煅秋石曲伸導引按摩消息默朝上帝舌柱上腭三田返還閉塞行氣大火聚於膀胱五行攢於苦海如斯小法何啻千門縱有勤功採取終不能成其大事經云正法難遇多迷真路多入邪宗此之謂也夫至真之要至簡至易難遇而易成若遇至人點化無不成就定庵曰弟子夙緣有幸得遇老師幸沾法乳金丹之要望賜點化師曰汝今諦聽當為演說夫煉丹者全在奪天地造化以乾坤為鼎器以日月為水火以陰陽為化機以烏兔為藥物仗天罡之斡運憑斗柄之推遷採氣有時運符有則進火退符和合四象追二氣歸黃道會三性於元宫返本還元歸根復命功圓神備凡脫為仙謂之丹成也定庵曰天地造化誠恐難奪師曰無出一身奚難之有天地形體也水火精氣也陰陽身心烏兔性情也所以形體為鼎爐精氣為水火情性為化機身心為藥材聖人恐學者無以取則遂以天地喻之人身與天地造化無有不同處身心兩箇字是藥也是火也所以天魂地魄乾馬坤牛陽鉛陰汞坎男離女日烏月兔無出於身心二字天罡斡運者天心也丹書云人心若與天心合顛倒陰陽止片時又云以心觀道道即心也以道觀心心即道也斗柄推遷者玄關也夫玄關者至玄至妙之機關也今之學者多泥形體或云眉間或云臍輪或云兩腎中間或云臍後腎前或云膀胱或云丹田或云首有九宫為玄關或指産門為生身處或指口鼻為玄牝都皆非也但著於形體上都不是亦不可離此身向外尋求諸丹經皆不言正在何處此所以難形筆舌亦說不得故曰玄關二字所以聖人只書一箇中字示人此中字玄關明矣所謂中者非中外之中亦非四維上下之中不是在中之中釋氏云不思善不思惡正於恁麼時那箇是自己本來面目此禪家之中也儒曰喜怒哀樂未發之謂中道教曰念頭不動處謂之中此道教之中也此乃三教只用一箇中也易曰寂然不動中之體也感而遂通中之用也老子云致虛極守靜篤萬物並作吾以觀其復易云復見天地之心且復卦一陽生於五陰之下陰者靜也陽者動也靜極生動只這動處便是玄關也公但向二六時中舉心動念處著工夫久久玄關自然見也若得見玄關藥物火候抽添運用乃至脫胎神化並不出此一竅採藥者採身中真鉛真汞也藥生有時夫時者非冬至非月生非子時師云煉丹不用尋冬至身中自有一陽生又云鉛到癸生急須採金逢望遠不堪嘗以此尋身中癸生時是一陽也便可下手採之二氣交合之後要識持盈不可太過望遠不堪嘗進火退符無以取則遂一年節候寒暑往來以為火符之則又以一月盈虧以明抽添之指且如冬至陽生復卦十二月二陽臨卦正月三陽泰卦二月四陽大壯卦三月五陽夬卦四月六陽純陽乾卦陽極陰生五月一陰姤卦六月二陰遁卦七月三陰否卦八月四陰觀卦九月五陰剝卦十月純陰坤卦陰極陽生周而復始此火符進退之機奈何學者執文泥象以冬至日下手進火夏至日退符二八月沐浴由不知其要也聖人見學者錯用心志又以一年節候促在一月之內以朔望象冬夏二至以兩弦比二八月以兩日半準一月以三十日準一年學者又著在月上用工夫又以月虧盈促在一日以子午體朔望以卯酉體二弦學者又著在一日上做工夫近代真師云一刻之工夫自有一年之節候又曰父母未生前焉有年月日時此聖人誘喻學者勿錯用心奈何泥著之徒不窮其理執文泥象徒爾勞心余今直指與公身中癸生時便是一陽也陽升陰降便是三陽也陰陽分便是四陽體二月如上弦比卯時為沐浴然後進火陰陽父神氣合六陽也陰陽相交神氣混融之後要識持盈不知止足前功俱廢故曰丹金逢望遠不堪嘗然後退符象一陰乃至陰陽分象三陰陰陽伏位宜沐浴象八月比下弦如酉時也然後運至六陰陰極陽生頃刻之間一周天也公但依而行之久久工夫漸凝漸結無質生質結成聖胎謂之丹成也定庵曰下手工夫周天火候之用已蒙師開發種種異名不能盡知望師指示師曰異名者只是譬喻無出乎身心二字下工之際凝耳韻含眼光緘舌氣調鼻息四大不動使精神魂魄意各安其位謂之五氣朝元運入中宫謂之攢簇五行心不動龍吟身不動虎嘯身心不動謂之降龍伏虎也以精氣喻之為龜蛇以身心喻之為龍虎龍虎龜蛇打成一片謂之和合四象以性攝情謂之金木併以精御氣謂之水火交木與火同源兩性一家東三南二同成五水與金同源北一西方四共之土在中宫屬自己五數戊己還從本生數心身意打成一片三家相見結嬰兒總謂三五混融也煉精化氣煉氣化神煉神還虛謂之三花聚鼎又謂之三關今之學者多指尾閭夾脊玉枕為三關者只是功法非至要也舉心動念處為玄牝今之人指口鼻者非也身心意為三要心中之性謂之砂中汞身中之氣謂之水中金金本生水乃水之母金返居水中故曰母隱子胎外境勿入內境勿令出謂之固濟寂然不動謂之養火虛無自然謂之運用存誠篤志謂之守城降伏內境謂之野戰真汞謂之姹女真鉛謂之嬰兒胎意謂之黃婆性情謂之夫婦澄心定意性寂神靈二物成團三元輻輳謂之成胎愛護靈根謂之溫養二者如龍養珠如雞覆子謂之護持勿令差失毫髮有差前功俱廢也陽神出現謂之脫胎歸根復命還其本初謂之超脫打破虛空謂之了當定庵曰金丹成時還可見否答曰可見再問有形否答曰無形再問既無形如何可見答曰金丹只是强名豈有形乎所以可見者不可以眼見釋氏云於不見中親見親見中不見道經云視之不見聽之不聞期謂之道視之不見未嘗不見聽之不聞未嘗不聞所謂可見可聞非耳目所及也乃心見意聞而已譬如大風起入山撼木入水揚波豈得謂之無觀之不見摶之不得豈得謂之有金丹之體亦復如是所以煉之初有無互用動靜相隨乃至成功諸緣頓息萬法皆空動靜俱忘有無俱遣始得玄珠成象太一歸真也性命雙全形神俱妙出有入無逍遙雲際果證金仙也所以經典丹書種種異名接引學人從粗達妙漸入佳境乃至見性悟空真事却不在紙上譬如過河之舟濟度斯民既登彼岸則舟船無用矣前賢云得兔忘蹄得魚忘筌此之謂也且余今之此集却不可執在紙上但只可細嚼熟玩其味窮究本源或一言之下心地開通直入無為之境是不難也更有向上關捩未易輕述當於言下之外求之待公工夫好向如何别有心傳口授且篤力而行之玄科深戒乃為頌曰授汝金丹一卷書且宜篤意返求諸若能宜解書中意妙用圓通體太虛鍊性指南性理之學本無次序或謂窮理盡性以至於命儘有次序或謂三事一時都了今之學者不知孰是我今分明說與公中下之士須從漸入先窮物理窮盡始得盡性才有一物不盡便有窒礙處須先一一窮盡得見自己性然後至於命也上智人則不然但窮得一理盡萬理自通盡性至命一時都了如禪家戒定慧一同也下根下器人忘情絶念謂之戒寂然不動謂之定默識潜通謂之慧上根器人則不然上根器人戒則自定定則自然慧通三事一時都了鍊金丹者漸教起手之初鍊精化氣漸次鍊氣化神然後鍊神還虛頓教則不然以精氣神謂之元藥物下手一時都了如此求之性理之學有甚次序若是有志氣男兒三事一時都了且道如何是三事一時都了咦一握亂絲緺一斬一齊斷登真捷徑頥庵詹公者興化賢宰也仁風及物心目臨民雖混迹於紅塵實存心於玄境真所謂居塵出塵之士也一日訪豫於蟾窟請益於豫略舉工夫則語扣之其應對不俗不容緘默故撰此命基九事而贈之以合九還之理其中所述金丹造化以襌宗奧㫖引證觀是書而熟玩其味曲求其㫖自然絶物我之殊無異同之見也若夫登真躡境之要無出乎此故以登真捷徑而名之焉都梁清庵瑩蟾子李純素撰一下手知時欲煉金丹先明下手處若不知下手工夫萬般扭捏千種杜撰都不濟事紫陽真人曰饒君聰慧過顔閔不遇明師莫强猜須是要真師指破安手下腳處既知下手處又要知時節所謂時者一陽時也今人多指子時為一陽時非也但著在時辰上都不是若云無時亦非也豈不聞吕真人云鍊已待時又不聞紫陽真人云鉛見癸生須急採經中道時至神知以此窮之便知道身中癸生便是一陽時也且道如何是癸生時咦行到水窮處坐看雲起時二真鉛真汞下手既知時節要識真鉛真汞鉛汞者不是凡鉛黑錫硃砂水銀是自己身中本來二物也强名藥物二物感合之妙故喻之為鉛汞蓋鉛性好飛汞性好走鉛見汞不飛汞見鉛不走身中藥物亦復如是要見藥麼咦雲起南山與北山三採藥入爐識得不為奇會採方為妙夫採藥物者不離動靜中動靜中採得來送入無為造化爐內用進三昧真火鍊成紫粉結成玄珠取而食之可以長生久視結就玄珠一句作麼生會咦捉住青山萬頃雲撈取碧潭一輪月四抽鉛添汞會得煉藥要識抽添所謂抽添者抽有餘而補不足也一切世間天人阿修羅人非人等情常有餘性常不足念常有餘心常不足精常有餘氣常不足忘精養性攝念歸心煉精化氣已上謂之抽添且如抽得有餘補了不足未為竒特更有向上事在須是到不抽不添處始得如何是不抽不添咦也不剩兮也不少信手拈來正恰好五火候周天若到無抽無添處正好行火候又道真火本無候又道不將火候著於火呵呵只這兩句子瞎了多少人眼開了多少人眼我今直指與君火者心也候者念也以心煉念謂之火候至於心定念息火候用也雖然恁麼道却不可著在心念上亦不得離了心念離了心念便是妄著了心念便是物在心念又不是離心念又不是畢竟作麼生咦寒來暑往秋收冬藏六持盈固濟行功之際要識持盈不識持盈前功俱廢紫陽真人云若也持盈未已心不免一朝遭殆辱太上云保此道者不欲盈此之謂也且道如何是持盈咦滿而不溢所以長守富也七固濟鼎爐既識持盈尤當固濟固濟者牢封土釜也毫釐有差天地懸隔所以火候既周周天數足含光默默真息綿綿十二時中常切照顧直待藥熟方得自如且道藥熟有何效驗咦此夜一輪滿清光何處無八溫養金丹成象更要溫養工夫如何是溫養如婦人懷胎相似二六時中行住坐卧兢兢業業如牛養黃如龍養珠常守其中勿令間斷直待分胎方得腳踏實地還會分胎麼咦瓜熟蒂落九調神出殼分胎之后調神出入更要子細如母愛護嬰兒相似興居服食處常要懷抱及至會行便要看守若不看守墮坑落塹直待立事方可離母調神工夫亦復如是鍾離公曰孩兒幼小未成人全藉娘娘養育恩三年九載人事盡縱橫天地不由親此之謂也雖然恁麼道不可作境會只要時時刻刻防危慮險直待和爐鼎一齊掀翻方見逍遙自在出入無拘遨遊物外與太虛同體如何掀翻爐鼎一句家破人亡虛空百雜碎獨露一丹蟾水調歌頭顯性理至道無言說神功妙莫量本來具足添之無礙减無妨不在多聞廣學只要潜通默會定裏細參詳箇中端的意元不離中黃圓陀陀光爍爍現堂堂無餘無缺通身無象合真常只這而今默識便是當來彌勒直下要承當開放頂門眼遍界不能藏金丹祕要大道無言無言不能顯其道金丹無象無象何以見其丹故聖人法天象地以道化人立種種名設種種象著丹書經典誘喻羣品奈何今之學者執象泥文又生見解異端並起三教殊途不能合一蓋因不知其源也余今以金丹造化祕要述成三十五頌明彰至理直指異名目之曰金丹祕要以贈退庵居士使其易為曉了苟或因言而解義自然抱本以歸虛直造希夷之妙境耳元始真如謂之性先天一氣謂性命之命性本神通大因身便不靈只今全放下依舊放光明法天象地謂之體負陰抱陽謂體用之用天地為立基陰陽運化機這些關捩子料得少人知心中元氣謂之龍身中元精謂龍虎之虎性定龍歸水情忘虎隱山性情和合了名姓列仙班太一靈泉謂之鉛朱陵火府謂鉛汞之汞欲煉南山汞先抽北海鉛身間心不動至寶便凝堅乾宫真金謂之鼎坤宫真土謂鼎爐之爐鼎用乾金鑄爐須坤土包身心端正後爐鼎自堅牢一靈真性謂之丹四大假合謂丹竈之竈幻體為丹竈真如是藥材工夫常不間定裏結靈胎繫風抱影謂之有掬水弄月謂有無之無會得離交坎方知有即無有無成一片煉作夜明珠以氣攝情謂之藥以心煉念謂藥火之火採藥元容易烹煎亦不難心頭無一事真火透三關虛無之谷謂之玄歸根之竅謂玄牝之牝虛谷氣歸根斯為天地門自從通闔闢金鼎鎮湯溫寂然不動謂之中感而遂通謂中正之正心靜方為正神清總是中湛然常不動天理感而通百神不散謂之靈萬氣常存謂靈寶之寶自己身中寶施為便有靈誠能含畜得放出大光明靈源浪息謂之清性地無塵謂清淨之淨神水本來清隨流便不澄只今還不動慧日自西東忘情絶念謂之抽煉情養性謂抽添之添養性謂添汞忘情是减鉛形神俱妙後無减亦無添揩磨心地謂之沐洗滌塵勞謂沐浴之浴要得狂猿伏先將劣馬擒纖毫塵不染神氣合乎心陰極陽生謂之復陽極陰生謂復姤之姤陰極陽來復陽生姤又侵學人明此趣一定見天心二物混融謂之交三元輻輳謂交合之合姹女安東室金公住在西黃婆相會合匹配作夫妻真息綿綿謂之溫含光默默謂溫養之養胎內嬰兒就便加溫養功時時常照顧脫殼顯神通氣來合神謂之返情來歸性謂返還之還欲要金歸性先教火返心兩般成一塊遍地總黃金入希夷門謂之收出羣迷徑謂收放之放亘古靈童子神通妙莫量放開周法界收則黍珠藏有無不立謂之虛內外皆空謂虛徹之徹著有終成幻云無又不中有無俱不立內外悉皆空悟本知源謂之靈廓然無礙謂靈通之通識破娘生面都無佛與仙廓然無所礙一任海成田全歸太極謂之圓爍破真空謂圓明之明力到丹成象功圓寶至堅性蟾形兆也照破未生前掀翻萬幻謂之覺獨露真常謂覺照之照一氣還元始元神返太初萬緣掀倒也獨露一真如純一不雜謂之全太虛同體謂全真之真一致而百慮同歸而殊途達得全真理身心混太初詩絶句贈程潔庵無為好向無中作自有瓊蟾照碧崖盡夜下工常不問氣圓神備産嬰孩潔庵識破世炎涼鏟彩埋光自養恬最有一般真樂處碧潭掬水弄瓊蟾庵兒潔淨元無物只箇瓊蟾養在中功備煉成三五一光輝南北與西東儒窮天理釋參禪道煉金丹法自然惟有瓊蟾通一貫頂門具眼法身全先生本是通儒學又得神仙正派傳透得真空成大覺瓊蟾形兆獨坤乾又五言絶句贈程潔庵除却玄關竅其他總不真無為終蹭蹬有作枉勞辛性定離交坎心澄木併金四般歸一處全在潔庵成肝肺非龍虎心腎豈坎離性情還混合烏兔自交持意要常中守心休向外迷潔庵常定一胎就養嬰兒河上牛郎立橋邊織女過一時才會遇兩意自諧和海底生紅熖山頭起白波潔庵歡樂處時聽木人歌鼎立懸胎鼎爐安太一爐但知生樂處便好下工夫頃刻虛通實須臾有入無潔庵工成也獲得夜明珠無藥休輕舉生鉛急下工駕車須坎虎起火仗玄風二物情交合三關路透通性天雲起處光照潔庵紅說破無為趣玄關奧且深欲求天上寶光覔水中金靈地無纖翳潔庵無點塵瓊蟾圓皎皎光透九天明一二三四五東西南北中五行攢一處只是靠金公得一萬事畢一居何所安更能忘却一即此是金丹罔象先天地無形混沌先先天交混沌玄外更無玄存誠終入聖致敬便通玄動靜了無礙逍遙樂自然詠儒釋道三教總贈程潔庵儒理物物包含太極微存誠致致知格物敬便知機無聲無臭無蹤跡體物昭然理莫違誠明靜定道之宗動靜相正心誠意因罔不同日用平常存一正自然天理感而通可歎世人太執迷隨聲逐人心惟危色轉傾危若能返理窮諸己性定身安神自怡道在凡人日用中顯仁藏道心惟微用發神功無餘無缺時時在爭奈凡人眼自瞢天心體用妙玄機捨妄從惟精惟一真便造微精義入神惟定一功深力到達希夷得造玄微篤力行堂堂大允執厥中道坦然平縱橫妙用中心定危者安而微者明存誠至要先窮理窮理神窮理盡性功在盡誠誠極理窮天大本性天發露太光明樂天知命真君子盡理窮以致於命微大聖人只要厥中為大本全明大本便通神責人之心惟責己恕己之忠恕而已心惟恕人忠恕兩全方達道克終克始不違仁羣陰剝盡一陽生牢閉玄復見天心關莫妄開靜極極中觀一動天心瑩徹悟元來世間物物全天理自是時知周萬物人鮮克知原始返終全太極窮神知化入無為先天太易理幽深廣大精退藏於密微妙莫評玩味探玄玄在己洗心藏退極於誠觀之不見聽無聲隱顯幽常愼其獨微常盡誠應用神機人莫測堂堂天意自昭明一物自有一太極機緘造一以貫之化體坤乾窮通一貫全天理抱本還元合自然無極極中全太極太極形復歸於無極而分兩儀萬物三才皆備我復元無極聖人基釋教法身清淨本無形有象何二身一體名圓滿身假使化身千百億不能合一不全真三心本一一元無捏聚分三心則一開只是渠見在更能無染著未來過去總歸虛莫誇口鼓學談禪但只澄消礙悟空心絶萬緣學解見知俱放下迷雲消散月華圓見了還如未見時不能含顯微無間蓄返成迷藏身韜晦無踪跡才是金毛獅子兒著有著無總難通兩下俱不立有無損又落空無有兼資終是幻執中方可合神功動中不動為真戒真定方戒定慧能合祖宗慧既升騰周法界情緣妄幻悉消鎔參禪求法性全迷離法求無有定法玄事轉違會得法從心上出法空心寂見牟尼虛心靜定通玄牝徹骨清虛徹靈通貧入道基靈地瑩然心月現禪天獨露大光輝真性元來本自圓如如不真如覺性動照中天光明瑩徹無遮障照破鴻濛未判前頥神養志慕清虛終日逍常樂我靜遙任卷舒最是定中真樂處禪天獨露瑩如如朝陽補衲假粧么補了肩朝陽補破衲頭又補腰補了破時重又補到頭爭似赤條條天外銀蟾才一半癡人要對月了殘經了末後段忽然些子黑雲來兩眼依然似瞎漢分明一座無縫塔强被傍金剛經塔人硬撞開八面四方都是眼中間現出活如來道教清清淨淨本無言才有施清淨無為為不自然默識通玄關竅透性靈神化寶凝堅無為好用法乾坤上下中無上至真間認本根正定始能通此趣真如透出爍天門莫著無心與有心無心爭真元妙用得悟天心有心必竟為心纍有無俱捐覺性純艮兌交重山澤損戒人懲損之又損忿絶嗔癡損之又損無懲窒絶學無為入聖基先天大道理難尋終日乾三返晝夜乾抱一真三返工夫為日用玄關透徹出陽神學解見知皆是垢聲聞圓一得永得覺總為塵洗心滌慮禪天淨凡聖齊瞻慧日明抽鉛只是絶塵緣添汞工抽添鉛汞夫本性天情性混融仙道畢汞鉛凝結大丹圓玄關牝户道之門闢則從玄牝之門乾闔則坤迷者忙忙推口鼻如何本命復歸根拋名弃利樂清虛萬幻諸出羣迷徑緣盡剪除性海波澄舟到岸一輪皎月出雲衢三關透了達真玄真造無入希夷門為本自然舉步便超無色界抬頭身在大羅天千經萬論講宗風可歎迷多言數窮途見不同大辨高談誇俊鋭到頭終是落頑空說妙談玄了不通爭如默不如守中默守其中不偏不倚玄關透不易方能合聖功立鼎燒乾四大海安爐煉九轉神丹碎五須彌金丹成象包三界方是男兒得志時真常之道無言說有說分可道非常道明是背宗若向不言中會意不勞餘力備全功清庵瑩蟾子語録卷之六後序嘗聞太上啓教接引方來故有神仙之學神仙之學豈尋常而語哉必是遇其至人點開心易通陰陽闔闢之機達性命混合之理超然獨立應化無窮始可與言神仙之學也自東華紹派鍾吕流輝以後列仙並駕而出者皆鴻生碩士上則匡君以行道下則澤民以濟生玄風益振競起學仙者代不少矣繼而瑩蟾子李清庵出道學淵源得神仙祕授三教之宗了然粲於胸次四方聞之踵門而請益者不可枚舉其發揮金丹之妙與弟子問答難疑之辭機鋒捷對之句凡若干言録而成書名曰清庵語録余誦其文再三篇篇無間言句句無間字皆發明太上之遺風先真之未露可謂明矣妙矣其文與中和集相表裏荆南羽士鄧坦然抄録已久今則命匠繡梓以壽其傳不泯清庵之德音可見運心之普矣學仙之徒覽斯文者必有超然而作者豈曰小補也哉南昌修江後學混然子稽首謹書
