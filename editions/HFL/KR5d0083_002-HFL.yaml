front:
  text: 清庵瑩蟾子語録卷之二卑六
  hash: sha256:9b1e831f926b5461d4fce1dcb5f1fe5bd64c04929a18e99e604fd4c77bbdd140
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0083_HFL_002-001a, image: hfl/0729/0729-032.png}
body:
  text: 門弟子定庵趙道可編道德心要清庵授道德會元於道可時諸門人同霑法乳得叅言外經㫖今將諸子叅傳語集成一篇與同志之士相與開發以其心領意會故曰心要師曰這箇道字不屬有句不屬無句不屬有象不屬無象諸人作麽會定庵曰咄嘿庵喝師曰這箇德字不屬修不屬不修如何即是嘿庵曰爲無爲定庵舉似師曰諸法眷離却語言三昧把出自己經來嘿庵書空誠庵拳師曰第一章末後句云玄之又玄衆妙之門切謂三十六部尊經皆從此經出且道此經從甚處出離却父母所生口道一句來嘿庵作開經勢定庵喝師曰第二章云有無相生且道不着有無一句又作麽生若道得入地獄似箭道不得入地獄似箭衆舉似皆未端的誠庵問曰如何即是師曰如是如是師曰第三章結句云爲無爲則無不治既是無爲如何說箇爲字在上若有爲却如何說箇無爲在下定庵曰體用兼資唯庵曰即此用離此用師曰第四章象帝之先一句以曰說爛却舌根以眼視突出眼睛含光嘿嘿正好喫棒諸人作麽會李監齋舉似實庵打圓相師曰第五章天地之間其猶橐籥乎師頌曰無底謂之橐三孔謂之籥中間一竅子無人摸得着爲君吹出無聲樂且道如何是一竅嘿庵曰照顧鼻孔實庵曰吽且道如何是無聲樂師代云碧落空歌師曰第六章玄牝之門師曰出息不涉萬縁入息不居陰界不出不入作麽會嘿庵曰寂然不動師自曰萬籟俱澄師曰第七章非以其無私耶故能成其私是謂修行人只爲自己屬私普度一切屬情不屬私情一句作麽道定庵曰先人後己師曰第八章上善若水師曰放下這點子黄河幾度清且道這點子放在甚處定庵嘿庵一般舉似師曰第九章功成名遂身退天之道且道退向甚處去定庵曰虛空一喝無踪跡嘿庵曰無處去師曰都未是或曰如何是師曰兩脚橐駞蔵北斗師曰第十章載營𩲸師曰𩲸好馳騁好運動好剛勇以何法度治之有心治則屬情無心又治不得作麽治嘿庵彈指一下師曰第十一章三十輻共一轂當其無有車之用且道輻不輳轂時車在甚處嘿庵曰轉轆轆定庵推車勢師曰第十二章五色令人目盲師曰離色離相瞎却眼睛諸人作麽會嘿庵曰見如不見師曰第十三章貴大患若身師曰有身則有患無身何以見道畢竟如何即是定庵曰放下着嘿庵曰養其無象師曰第十四章視之不見師曰無縫罅諸人作麽會實庵曰渾如雞子師曰未是或曰師如何道師曰對面不相識師曰第十五章微妙玄通深不可測師曰水將杖探人將語探道將甚麽採定庵嘿庵皆舉拳師曰一狀領過師曰第十六章致虛極守靜篤萬物並作吾以觀其復切謂復見天心且道天心在甚處又曰不可動動着三十棒定庵奪棒師曰第十七章太上下之有知師曰不屬有相不屬無相要見自己太上諸子無對師曰只今見在說法師曰第十八章智慧出有大僞師曰聦明迷大本智慧喪天眞諸人作麽會止庵曰無爲損庵曰智不如愚師曰第十九章絶聖棄智諸人作麽會定庵曰忘其所自師曰第二十章絶學無憂師曰諸人唤甚麽做絶學嘿庵曰繫風捕影師曰學不學覆衆人之所過師曰第二十一章師曰有物有象有情果有乎若謂有來且叅學眼若謂無來去叅學眼畢竟作麽道嘿庵曰有無俱不涉惟有一眞實相損庵打圓相師曰第二十二章曲則全枉則直師曰木不材者壽鴈不材者烹如何即是諸人皆不答師曰材不材各順時師曰第二十三章希言自然師曰嘿嘿無言落第二機如何是第一機諸人答皆不中節師曰開口不在舌上師曰第二十四章跂者不立跨者不行諸人作麽會定庵曰舉步不在脚跟上師曰第二十五章有物混成師曰有箇甚物定庵舉似又曰域中有四大還更有大底麽嘿庵喝師曰第二十六章輕則失臣躁則失君師曰不輕不躁又作麽生定庵曰道泰時清嘿庵曰成性存存師曰第二十七章善行無轍迹諸人會麽嘿庵曰大力量人擡脚不起師曰第二十八章師曰守黑守雌守辱是用也無極太朴嬰兒是體也朴散爲器諸人作麽會定庵曰生生化化師曰第二十九章將欲取天下爲之者吾見其不得已師曰予謂錯且道在甚處定庵曰在爲處師曰第三十章以道佐人主者不以兵强天下師曰設有寇至作麽敵嘿庵曰以德化之師曰不若以慈衛之師曰第三十一章佳兵不祥之器師曰不用兵無以禦敵用兵則非道作麽是定庵曰逆行順化師曰第三十二章道常無爲朴雖小天下不敢臣師曰朴雖小一句作麽會定庵曰芥納須彌嘿庵曰卑而不可踰師曰第三十三章死而不亡者壽師曰不亡底是甚麽嘿庵曰無中有宻庵曰虛靈不昧師曰第三十四章聖人不自大故能成其大師曰如何是不自大嘿庵曰勃勃從珠口入師曰上善若水師曰第三十五章執大象師曰若云有象便不大若云無象如何執嘿庵曰黍珠中世界師曰似不肖故大師曰第三十六章將欲歙之必固張之師曰睫上眉毛早錯過且道錯向甚處去定庵曰當處嘿庵曰鷂過新羅實庵曰不得亂走師曰一狀領過師曰第三十七章道常無爲而無不爲師曰予頌云有作皆爲幻無爲又落空兩途俱不涉請頌一句嘿庵曰對面不相逢止庵一定守其中宻庵曰自有大神通師曰當處闡宗風師曰第三十八章上德不德是以有德師曰唤甚麽做德嘿庵曰不自有其有師曰不自矜師曰第三十九章昔之得一者天得一以清師曰且道得一安在甚處嘿庵曰安在無爲處師曰無用處更好師曰第四十章末後一句云天下萬物生於有有生於無師曰無有之外更有甚麽嘿庵曰有這箇舉似師曰第四十一章下士聞道大笑之師曰笑箇甚麽嘿庵舉云笑這箇宻庵曰笑箇無爲師曰第四十二章或損之而益或益之而損師曰不損不益時如何嘿庵曰無欠無餘師曰剔渾淪師曰第四十三章天下之至柔馳騁天下之至剛師曰觸來勿與競事過心清涼如何是清涼境嘿庵曰無熱惱師曰無無明師曰第四十四章名與身孰親財與貨孰多川老云若能運出家中寳啼爲山花一樣新如何是家中寳嘿庵曰哩哩羅定庵喝師曰一曰慈師曰第四十五章師曰上章知足不辱知止不殆謂常足也此章云大成若缺大盈若沖不足也足底是不足底是損庵止庵曰滿招損謙受益師曰德有餘而爲不足者壽財有餘而爲不足者鄙故云師曰第四十六章罪莫大於可欲師曰不見可欲使心不亂急走回來救得一半且道那一半如何定庵曰不離當處師曰第四十七章末後句云不見而名無爲而成師曰名箇甚成箇甚定庵嘿庵皆曰成德名道師曰第四十八章爲學日益爲道日損師曰益人甚損人甚定庵曰損己益人嘿庵曰損情益性師曰第四十九章師曰第五十章生之徒十有三死之徒十有三師曰涅槃心易曉差别智難明如何差别智衆無答師曰仁者謂仁智者智師曰如何涅槃心衆無答師曰前無徃古后無只今師曰第五十一章道生之德畜之師曰生箇甚畜箇甚實庵曰生之畜之只是這箇師曰較些子師曰第五十二章天下有始以爲天下母首章云有名萬物之母名唤甚麽諸人答不中誠庵問曰唤做甚麽名師唤誠庵誠庵應諾師曰安名了也師曰第五十三章使我介然有所知行於大道惟施是畏師曰畏箇甚嘿庵曰畏天命師曰第五十四章以國觀國師曰觀國非容易觀身意更深海枯終見底人死不知心還有知心底麽諸人答不應機誠庵問師還有知心底麽師應之曰問者是誰師曰第五十五章含德之厚比於赤子師曰即孟子謂大人者不失赤子之心意且道赤子之心是已發否嘿庵曰純一定庵曰寂然不動師曰未盡在殊不知返者道之用也師曰第五十六章知者不言言者不知師曰言底是不言是諸人答不切師曰父母所生口終不爲君通師曰第五十七章以正治國以竒用兵以無事取天下師曰取天下安得無事無事何以取天下衆無對師曰導之以德師曰第五十八章師曰末後一句光而不耀作麽會衆無語師曰被褐懷玉師曰第五十九章治人事天莫若嗇作麽會止庵曰儉師曰從儉師曰第六十章以道莅天下其鬼不神如何說嘿庵曰無以施其能定庵曰邪不干正師曰第六十一章大國者下流師曰等閑伸出無爲手不動干戈定太平唤甚麽做無爲手嘿庵曰掀翻三教誠庵曰打破虛空師曰第六十二章有罪以免耶師曰過在甚處定庵曰覔過了不可得師擲經云休翻疑師曰第六十三章圖難於其易師曰說易非容易言難未是難箇中竒特處請續一句嘿庵云元只在中間實庵云元不離玄關師曰北斗面南看師曰第六十四章其安易持師曰諸人作麽會嘿庵防微杜漸師曰第六十五章古之善爲道者非以明民將以愚之師曰一切有爲法三千六百門從頭都勘破總是弄精魂惟予獨抱無名朴無限羣魔倒赤旛諸人會麽定庵曰認着一物即不中嘿庵擲經師曰第六十六章江海所以能爲百谷王者以其善下之師曰且道江海下百谷耶百谷下江海耶嘿庵曰聚散皆歸一定庵曰上遜下順師曰下下下師曰第六十七章捨其慈且勇捨其儉且廣捨其後且先死矣師曰莫飲無明水且道唤作麽做無明水定庵曰陸地平沈嘿庵曰無風浪起師曰第六十八章善爲士者不武師曰不文不武無得無失摸着鼻孔通身汗出且道父母未生前鼻孔在甚處定庵曰出息入息處嘿庵曰在闔闢處實庵曰只在眉毛下師曰第六十九章用兵有言吾不敢爲主而爲客且道主客如何分諸人無答師曰你是何人我是誰又曰兩眼對兩眼師曰第七十章吾道甚易知甚易行如何又道莫能知莫能行若向這裏下得一轉語叅學事畢其或未然叅定庵曰百姓日用而不知嘿庵曰只在目前人不識師曰只爲大分明師曰第七十一章知不知上不知知病此病作麽治嘿庵曰寸心不昧其諸子皆不的當師曰吾將鎮之以無名之朴又曰不然則渾淪吞箇熱鐵丸又曰下士須是喫服藥過瀉去惡知識矣師曰第七十二章民不畏威則大威至如何是大威嘿庵曰生死事大師曰無常迅速師曰第七十三章勇於敢則殺勇於不敢則活師曰如何是殺活機衆無答師曰如王秉劔師曰第七十四章代大匠斲希有不傷其手者師曰作麽會定庵曰不是當行家師曰第七十五章末後句云夫惟無以生爲者是賢於貴生師曰諸人作麽會定庵曰以其無死地師曰第七十六章民之生也柔弱其死也堅强作麽會定庵曰柔弱生之徒師曰第七十七章天之道損有餘而補不足人之道損不足以奉有餘師曰且道不損不益時如何衆無對師曰也不剩兮也不少信手拈來便恰好師曰第七十八章受國之不祥能爲天下王師曰作麽會諸人無答師曰無忌諱師曰第七十九章和大怨必有餘怨安可以爲善如何說惟安曰克己爲善定庵曰克己復禮嘿庵曰慈忍爲善師曰一狀領過或曰師作麽道師曰恩怨兩忘師曰第八十章末後句云民至老死不相徃來如何說嘿庵曰安其家定庵曰無爭師曰内境不出外境不入師曰第八十一章聖人之道爲而不爭師曰作麽是不爭衆答不應機師曰放倒門刹竿着師又曰各人要一聯句體道德二字嘿庵曰道蔵諸用德顯諸仁定庵曰道不在修德不在求唯庵曰道不無中無德不有中有實庵曰道可道非道德上德不德師曰道寂然不動德感而遂通又云道清靜光明德謙柔巽順師曰各人要一聯證無爲道德二字衆無答師曰道擎拳德稽首師指燭云各人作聯要見此燭體用嘿庵曰體塞破虛空用照破黑暗實庵曰體圓陀陀用光爍爍師曰體如如不動用爍爍圓明又曰體撑天拄地用照天爍地師曰各人要無說一聯要見燭體用諸人無答師舉似衆有省清庵螢蟾子語録卷之二
