body:
  text: 清庵瑩蟾子語録序作家話靶打頭相遇便把自家屋裏話拈出此豈非道中之作家者乎予自幼業儒壯愛談空雖愚賤者有能道酸餡氣話亦不以儒自高必屈己下問但未能遇作家爾一日歸茅山舊隱清庵瑩蟾子李君來訪座未温發數語字字無烟火氣繼而講羲皇未畫以前易透祖師過不切底關把三教紙上語掃得赤洒洒將我輩瞎漢眼點出圓陀陀清氣襲人和光滿座恍不知移蟾窟於予身中耶抑予潜身入蟾窟中耶是夜驚喜萬倍整心慮爇心香拜於床下曰眞我師也眞作家也師不我棄願加警誨是後從師日久問答頗多集成一編時爲展敬直待向清庵座下踢翻玄妙寨粉碎太虛空方爲了事漢於斯時也若有箇出來問清庵老曰到這裏要這骨董做甚必則曰便是我打頭遇作家底話靶時至元戊子夏季大雨時行日茅山道士嘿庵廣蟾子稽首謹書
