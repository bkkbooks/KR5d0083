front:
  text: 清庵瑩蟾子語録卷之一
  hash: sha256:adaca5872813065351cad56d2474c5adeb7038c471c0280971c0feb6a514fb5a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0083_HFL_001-001a, image: hfl/0729/0729-006.png}
body:
  text: 門弟子嘿庵柴元臯編大顛心經注云有僧問岑和尚二鼠侵藤如何淘汰岑曰今時人須是隱身去敢問何謂隱身師曰何須待零落然後始知空須是只今件件不着事事不染我不見一切物則一切物亦不見我是謂隱身也問曰欲言言不及山東河北好商量此意如何師曰此事若以言說說不能盡末後一句至廣至大都包盡了更有何說只這言不及已自說了問曰要識此經麽曰西瞿耶尼北鬱單越何故偏指此二句師曰我不如是道若有人問我如何是此經我只向他道東西十萬南北八千問曰是大神呪是大明呪是無上呪是無等等呪此四句三教書中比得甚麽師曰比得道書妙中之妙玄之又玄無上可上不然而然又比得儒書中眞觀眞明眞勝一雖然最上一着又在言句之外問曰罔明菩薩初地出家如何出得女子定文殊菩薩是七佛之師如何出不得師曰臭庵云犬迎曾宿客鴉護落巢兒說得好分曉休更疑惑師問予曰因出不得女子定文殊召罔明叅不二法門文殊云不得動動着三十棒子作麽會予方擬議間因定庵動身偶觸其機遂舉似師然之師曰井底泥蛇舞柘枝䆫間明月照梅梨作麽生會予擬議良久曰吹出竅中一曲爍破眼裏空花師曰不是予又曰腦蓋撞開惟有我眼睛突出更無他師曰較些子問曰昔兩僧捲簾公案其間一得一失謂何師曰仁者見之謂之仁智者見之謂之智問曰僧問夾山如何是法身山云法身無相僧云如何是法眼山云法眼無瑕道吾聞之不許後叅船子回來再舉此話亦依前答道吾云今番有師子敢問吾師一般問一般答如何不許前却許後師曰雲月是同溪山各異師曰問洞山有寳鏡三昧五位顯訣云正中偏偏中正正中來偏中至兼中到五事如何叅答曰正不得中莫見其偏偏不得中莫顯其正正者來歸中偏者亦至中偏正合一皆中則兼到矣到此偏正兩忘惟中獨存是也師曰欠些子若於動靜中會意始得一日師與四人同坐次師曰川老云是心非心不是心如何說衆答皆不當答曰是心也不是非心也不是師曰如何即是予一喝師曰牢收取師曰如何是道予拍臺下又曰如何是道中人予又拍一下師曰欠些箇予隨聲一喝師曰早遲八刻問曰三十輻共一轂如何說師曰輻與轂只是器之體輻來輳轂方成車之用比得三十日共一月以成明之用又比得萬法歸空以成性之用皆同也問曰生之徒十有三死之徒十有三此說譬之者多請師爲我正之師曰生之徒水火既濟也死之徒水火相違也水成數六火成數七六與七合十三數古人道七六十三兮月宫春色者是也或謂七情六欲合十三者稍通或以八卦五行言之者非也豈不聞下經有云堅强死之徒柔弱生之徒乎堅强爲忿欲使也柔弱謂懲忿窒欲也忿欲起則上炎下濕水火違也忿欲絶則陽降陰升水火濟也復何疑哉問曰天地之間其猶橐籥乎虛而不屈動而愈出其橐籥可以建天地造化之妙歟願師明以告之師曰橐是没底囊籥是三孔笛總謂之鼓風韝此喻天地至虛無窮妙義悉具其中又喻人之虛靈不昧也不屈言其舒徐通暢之義也動而愈出應變無窮也問曰朝屯暮蒙如何說師曰乾坤坎離爲匡廓六十卦運化於其中始於屯蒙終於既未以爲火符之則丹書以乾坤爲鼎器坎離爲藥物諸卦爲化機者是也六十卦共三百六十爻象一年三百六十日之數自冬至後起屯蒙大雪盡日是既未也以一月言之初一日起屯蒙月晦日是既未以一日言之子時起屯蒙亥時是既未若以工夫言之頃刻之工夫奪一年之節候自起手便是屯蒙收拾便是既未所謂朝屯暮蒙只此總名也達是理者一刹那間周天數足諸卦悉在其中矣祖師謂無爻卦内定乾坤者是也問曰寳瓶裏面養金鵝如何說師曰以無爲言之是兩則公案以有爲言之是一段工夫且先以無爲向公道僧問趙州狗子有佛性也無州云有僧曰爲甚有州云無僧云爲甚無州云爲伊了無又古德云瓶中鵝子成鵝了如何出得瓶去此兩則公案今人多有過不得底如有人下得一轉語叅學事畢又以有爲言之狗者無中有也陰中陽也又狗乃司寇帳中狗者防内盜也寳瓶裏面養金鵝水中金也爐中丹也養金鵝則是養聖胎也聖胎成如瓶中鵝子也瓶破鵝出世俗之常理也鵝出而瓶不破此脫胎之妙也故祖師云錦帳之中藏玉狗寳瓶裏面養金鵝其金丹之妙歟問曰休妻謾遣陰陽隔其說如何師曰紫陽云未得眞鈆莫隱山此一句頗同今時學道底人被謬師所惑傳得箇工法便道他得道了也休妻棄子入山隱遁及至行功無驗便生退悔或還俗歸家者或再取妻者如此之人極多又有下愚無學之人不達聖人之理却言休妻不是道反指婦人爲鼎器或謂婦人身中有藥或指産門爲生身處此大亂之道也殊不知祖師當來指示世人若不能絶欲徒爾休妻又見學者錯會其意故復云自然有鼎烹龍虎何必擔家戀子妻今之無學只着在前句上全不思後句眞罪人也問曰我師嘗謂修丹者不可着在年月日時上如何却又道採藥須知昏曉師曰此即與屯蒙同一意也其用處稍異立春立秋乃年中昏曉上下兩弦月中昏曉寅申二時日中昏曉陰陽交會之時乃身中昏曉也通乎晝夜之道則知陰陽推盪之理推幽明之故則知死生之說佛仙聖之人大要盡在是矣問曰視之不見名曰希聽之不聞名曰夷摶之不得名曰微與視不見我聽不得聞離種種邊名爲妙道是同是異師曰大槩相似其理實不同前是體後是用中庸曰戒愼乎其所不覩恐懼乎其所不聞莫見乎隱莫顯乎微故君子常愼其獨即視不見我處聽不得聞處離得種種邊方謂之妙道也若謂視之不可見聽之不可聞摶之不可得曰希曰夷曰微又有甚種種邊可離也印愚樂問曰一年十二月有箇子月一日十二時有箇子時不知人身中子時在甚處師曰致虛極守靜篤萬物並作吾以觀其復其斯之謂歟答曰癸生之時時動必潰此說如何師曰然印又問曰元始懸一寳珠去地五丈師曰相公如何說印曰五者陽數也師曰非也去地五丈則是離五濁辱也在虛玄之中則是潜神入妙也答曰五濁之上即玄牝之門歟師曰雖然不下實工夫不曾親見得徒說得有此象又濟得箇甚麽事問曰天地不仁以萬物爲芻狗聖人不仁以百姓爲芻狗何譬之至賤也師曰天地聖人不以仁爲仁故視萬物百姓至微而譬之自生自殺也雖自生自殺實歸根復命也易繫云顯諸仁藏諸用皷萬物不與聖人同憂即天地不仁以萬物爲芻狗之義也乾以美利利天下不言所利大矣哉即聖人不仁以百姓爲芻狗也問曰嬰兒之未孩孟子云大人者不失其赤子之心是同否師曰同此言其大朴未散其復不遠也問曰老子云道之爲物惟恍惟惚恍兮惚其中有物惚兮恍其中有象窈兮冥其中有精其精甚眞其中有信如何三者之中獨言其精甚眞其中有信耶師曰聖人言有物混成先天地生則這先天地生便是道之顯象也象因天地而顯天地因有物而混成物因二五之精妙合而凝所以二五之精道之體也象與物道之用也問曰戒愼乎其所不覩一節以視不見我四句譬喻得甚切若只以儒家話引喻得切更好願師着一語師曰前兩句如在無人之境而常存乎誠也後兩句如與人對面常防其有不測之意也且如上天之載無聲無臭誠之不可揜非見隱顯微之宻乎上天之載雖無聲無臭之可聞知然天理昭昭誠不可揜也問曰憂悔吝者存乎介如何說師曰介謂我心匪石不可轉也凡舉心動念處先存乎介介然大定則毫毛之動悉皆先兆奚悔吝之有只要先覺爲上問曰先甲三日後甲三日與先庚三日後庚三日同否師曰不同蠱者亂也覺之於未然不至於亂覺之於已然而後治之亂亦可救也苟不覺亂之甚也甲者首也覺於三日之先謂之先甲覺於三日之後謂之後甲後於三日之遠非覺也先庚後庚在巽九五巽爲風天之命令也令有改更則民不信巳日乃孚若於未更前三日先告誡利害然後有所革變則民從而信之也又於已更三日之後復告誡使其樂然爲善也甲至戊己爲中庚過中也過中則變故曰庚所謂庚者更革之義也師曰非道不可言即道如何說速道速道予舉似師然之師曰不可道不可名公作何說答曰說則說矣恐所以見淺近願師言之師曰從自然出者不可道之道本無名唤是不可名之名從道中出者是可道之道才可名道是可名之名不可道不可名是天地之始可道可名是萬物之母欲見其始常無欲以觀其妙欲見其母常有欲以觀其徼妙玄妙始於無始也徼邊徼見於可見者也此兩者同出而異名同謂之玄也師曰吾昔日侍坐於適庵師之前師令我對一對句曰精關神關與氣關三關一輳吾對曰天籟地籟與人籟萬籟俱鳴師改鳴字作澄字公對箇甚麽答曰文火武火加慧火總火全功師又曰吾有一對以先覺而覺後覺對箇甚答曰由外觀而觀内觀師曰改由字作反字更好冬至夜師曰一陽來復先王以至日閉關對箇甚麽對曰六畫備坤君子故及時修業師然之一日師對衆云先聖易心即是後人心易各請一對答曰吾身神炁本是元始炁神詹宰云太初眞性豈非今日性眞師曰吾自有一對諸人諦聽師曰小生經蔵元同老子藏經諸人莫能及師曰肺屬金金本沈也爲甚却浮肝屬木木本浮也爲甚却沈諸人皆無答師曰肺因受炁而有乙木在内故浮肝因受炁而有庚金在内故沈以卦言之兌爲金金性本沈因金生北一之水爲坎坎中眞火上炎故浮震爲木木性本浮震下實因木生南二之火爲離離中眞水下降故沈以藥物言之鈆屬金本沈見火即升故浮汞屬木本浮見水則墜故沈以法象言之月屬坎本沈進火故浮日屬離本浮退符故沈古人云潭底日紅陰恠滅因水而沈也山頭月白藥苗新因炁而浮也總而言之金空即浮木實即沈此之謂也師曰主中主賔中賔賔中主主中賔諸人作麽會衆皆不解此機詹宰曰身外身是主中主夢中夢則賔中賔情中性是賔中主性中情是主中賔師曰較些子答曰我惟有我他又去說他他來使我我又役他即此意也師曰未徹在答曰又心外無心主中主念中起念賔中賔未動先覺賔中主動後方覺主中賔師曰不若以動靜言之最親切靜中極靜主中主動而又動賔中賔動中守定賔中主靜中散亂主中賔師曰乾有四德坤有幾德答曰坤亦有四德師曰未盡善夫坤元亨利與乾同貞之一字不同順承而後方貞故曰牝馬之貞也牝馬柔順徤行之謂也師曰屯有幾德答曰元亨利貞與乾同其辭其德則不同也師曰何謂不同吾思之未及對師曰若同德則非屯難也所謂元亨者元有大亨通之義也利貞者利在正固也苟非正固則不足以免屯難矣何亨之有若能固守元有之亨則能濟屯難而已師曰西南得朋東北喪朋何謂也吾思之未及答師笑曰公未知之蓋陰類又得陰朋陰炁愈盛則愈迷亂矣故曰失常至東北之陽位又喪其陰朋是以安貞吉也陰既從陽有生成之理故曰得常修眞之士情念一動是陰也若縱意隨之是陰得朋也亦謂之失常苟以剛志斷之念從何起念情絶則喪其朋也亦謂之得常非天下之至明其孰能與於此師曰謙六爻皆吉何也答曰由其謙下之致也師曰然諸爻皆言謙第五爻不言謙何也蓋五爲君不過於謙則不失其權也故有利用侵伐無不利之說也所以修眞之士須要剛柔兼濟不可過於柔也師曰先天而天弗違後天而奉天時何也答曰未生以前爲先天故無所違既生以後爲後天故有所奉師曰只當以先覺喻先天出乎自然後覺喻後天出乎不得已出乎自然天理弗違出乎不得已我不敢違乎天故曰奉天時也師曰喜怒哀樂未發謂之中發而皆中節謂之和我試問公輩欲發未發作磨生會良久應之師曰是已發也予默然師曰是未發也再一答師許之曰留取自受用恐瞎却後人眼自悟者始得用也清庵瑩蟾子語録卷之一
