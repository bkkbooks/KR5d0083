front:
  text: 清庵瑩蟾子語録卷之三卑七
  hash: sha256:bb0c9562319b2ebdda55cff91197c5b2395cd768920984d254a09199c8843d28
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0083_HFL_003-001a, image: hfl/0729/0729-060.png}
body:
  text: 知堂實庵苗善時編初入中和精舍庵門銀山鐵壁由誰建立透得此關了無闔闢且道此關作麼透卓拄杖一下云咦便從這裏入聖堂才說金闕化身已自天機露泄重增外象莊嚴又是一場敗缺畢竟作麼咄要見黃金滿月相大家進步裏頭來參聖至慈至仁至靈至聖掌生死關行殺活令激濁揚清驅邪輔正惡不報善不應雖然顯現許大神通也向清庵手中乞命既如是又拜箇甚麼咦因我得禮孰敢不敬冬至升堂講經升座上香祝語畢師舉拄杖云道本無言豫亦不會多說借這拄杖子有時在豫手中為體有時在豫手中為用橫按拄杖云是體是用良久又云用則撑天拄地這條拄杖神通莫測妙用難量方才舉起十方無極飛天神王長生大神無鞅數衆齊立下風太上老君也來拄杖頭乞命何以故一朝權在手便把令來行舉起拄杖云大衆看打一下云打一棒打得虛空𨁝跳攪一攪云攪一攪攪得混沌密融畫一畫云畫一畫畫開三教籓籬卓一下云卓一卓卓透諸人鼻孔雖然有許大神通盡大地不曾打得一箇何以故清庵拄杖不打鈍漢喝一喝云莫有要喫棒底麼便請出來實庵出拜而問曰冬至下雪此意如何師曰這一問滴水滴凍不可作祥瑞會不可不作祥瑞會未具參學眼不作祥瑞會未具絫學眼且道作麼生咦地雷震動一陽至素女青郎會絳宫歌罷酒闌雲雨散亂將碎玉撒虛空這箇莫是冬至月雪麼咦莫作境會何以故守城不用尋冬至身中自有一陽生年中自有年中冬至月中自有月中冬至日中自有日中冬至時中自有時中冬至一陽節是年中冬至每月初一日是月中冬至每日子時是日中冬至且道如何是身中冬至實庵曰請師開示師曰月到天心處風來水面時一般清意味料得少人知會麼實庵曰唯師曰猶恐有未會底再念得至虛極一章麼曰念得師曰先念起頭四句曰致虛極守靜篤萬物並作吾以觀其復師曰孔子云雷在地中復先王以至日閉關商旅不行后不省方此謂上古帝王於冬至日閉關不許商旅往來使民致虛守靜以待新陽復也新陽既復四時順序五穀豐登世人於一陽來復之時守其安靜使內境不出外境不入以待一陽來復一陽既復四大咸安百骸俱理此長生久視之道也且如今日冬至下雪商旅自然不往來也豈得不是祥瑞雖然萬般祥瑞不如無你再念四句曰夫物藝藝各復歸其根歸根曰靜靜曰復命師曰此四句謂觀化知復也且如復卦自坤而復坤靜也陽動也靜極復動天心見矣再念四句曰復命曰常知常曰明不知常妄作凶師曰世人會得這些消息直造真常境界故曰明苟或一陽來復昧而不知妄有施為喪身必矣故曰凶再念四句曰知常容容乃公公乃王王乃天師曰容謂廣納包容也公者謂普及一切也至公且普則可以作之君作之師天人同一理也再念後句曰天乃道道乃久沒身不殆師曰體天合道長生久視之道盡矣到這裏更進一步方證無生法忍之妙有人認得親切直下承當下靜定工夫至於致虛之極守靜之篤天心見矣天心既見便於當處放大光明遍照三千大千世界於一一世界中各具三千大千國土於一一國土中各具三千大千法門於一一法門各具三千大千善智識於一一善智識各具三千大千眷屬於一一眷屬各具如是眼各見如是天心各放如是光明遍照三千大千世界恁麼則盡大地人同一箇鼻孔出氣也到這裏方知道月月日日都是冬至時時刻刻都是冬至今曰冬至只是尋常日也古德云大都只是尋常日蒿撓衆生亂一場既說道只是尋常日為甚麼今日作法事莫是分外麼雖然只得隨鄉入鄉依例下箇注腳有人會這箇注腳麼實庵曰不會師曰你問我曰如何是冬至注腳師曰即日仲冬喜雪恭惟尊候動止萬福會麼曰唯師曰既會如何不拜實庵拜師曰且住更有向上事在曰更有甚麼師曰清庵舉似瑞雪應至日之休祥會首復此令辰納自天之福祐珍重珍重便下座放參師舉拂子示衆云夫道體於無體名於無名亦無可說說亦不得今日既升座借這拂子代吾說法這箇拂子不是拂子是惹鬧何以故才拈起來便是翻祖師疑便瞎衆人眼便要尋訂鬥這箇拂子通身都是口這箇拂子通身都是手這箇拂子通身都是眼這箇拂子神通莫測變化無窮堅起云看有眼也無敲一敲云聽有耳也無擲下拂子云咦有神通也無侍者拈拂子與師師曰即此用離此用良久又云山河大地都在這拂子頭上森羅萬象都在這拂子頭上三賢十聖都在拂子頭上盡大地人都在這拂子頭上搖拂子云大衆莫有不在拂子頭上底麼便請出來相見黃居士出云雷發一聲驚霹靂震動滿天星斗寒上啓吾師如何是一陽消息師打圓象云會麼黃曰會身中一陽又作麼生師振拂子喝一聲黃曰直下承當師曰只恁麼去黃拜謝曰不是我師親說破幾乎錯過一陽生戴甲庵問曰大都只是尋常日蒿撓衆生亂一場為甚麼唤作冬至又道一陽生却如何下雪畢竟作麼生師曰大地坦平乾坤一色會麼曰未會師曰近前來向你道戴至師前師曰從教雪覆千山白孤峯元自别巍巍戴拜謝而退師曰我有一箇隱語請你衆人參經云惚兮恍其中有象恍兮惚其中有物且道是箇甚麼物若有人參得著便從法座上拖下李清庵來一頓打死深掘坑厚著土埋教不見蹤跡不為過若參不著却被李清庵埋却你去也其或未然我更添箇注腳頌曰我有一件物能小亦能大體則同太虛用則遍法界拈起天不容放下地莫載見之者則突出眼睛聞之者則迸裂腦蓋道人會此振動篷島三山緇流會此掌握曹溪一派以之治國國安民豐以之助道時清道泰若論酬價價直萬兩黃金若遇知音不用一文便賣為甚不用一文不圖利只圖快只今舉似向君試問會也不會實庵曰不會師曰休論會與不會只今自買自賣打圓象云看兩手縫合中間拈出自然香太上老君聖誕上堂師升座云太上元無上常存日用間可憐無學輩剛道出幽關大衆且道太上在甚麼處咦只今見在說法諸人還會麼縱饒直下會意猶隔清庵一線道在何以故若言他是太上自己却是甚麼須是向自己究竟方見得親切太上云真常之道悟者自得即此意也又云衆生所以不得真道者為有妄心是謂妄心一動起種種差别因緣因緣纏縛失道之本也聖人為見衆生迷真之故於是設立種種方便誘諭世人離諸染著出諸迷徑是經所以作也經也者返道之徑歟讀是經者當知此經元是强名本無可說說亦不得取不得捨不得添不得减不得形容不得舉似人不得不屬講論不屬智識不屬見聞不屬有無莫作實相會莫作實虛無會莫作文理會莫作斷常會然則從事於道者將奚所自耶非執大象者則不足造也太上云執大象天下往往而不害安平太樂與餌過客止道之出口淡乎其無味是謂以聲色見道者屬無常法終有盡期道之出口淡而無味視之不足見聽之不足聞用之不可既大哉聖人之言乎若是箇信得及底便能離一切相了一切法直下打併教赤灑灑空蕩蕩地潜大音於希聲隱大象於無形則自然形神俱妙與道合真也奈何今之學者不求師㫖私意揣度或泥於文理或執著文辭聖人作經之義由是晦矣此經中不注腳者往往不同良由此也殊不知才開臭口十萬八千才言可道便非常道才言可名便非常名然則常道不可道五千餘言非道乎常名不可名道德經名非名乎咦非道不可道不可道即道非名不可名不可名即名若向這裏具眼參學事畢其或未然未免隨人腳轉仁者以仁見智者以智見百姓日用而不知故聖人之道知之者鮮矣清庵不惜兩片為你諸人道破此一卷經拭不淨底故紙既是不淨故紙無用五千餘言發明不可道之義也譬如大醫治病對證發藥病既瘥矣藥亦無用既得常道五千餘言亦無用作是見者則知可道可名道之邊徼也不可道不可名道之玄妙也有名之徼道之用也無名之妙道之體也無名天地之始也有名萬物之母也此兩者同出而異名同謂之玄玄之又玄衆妙之門苟有自有名之徼而造無名之妙者真常之道得矣非天下之至虛其孰能與於此大衆清庵饒舌至此是說耶非說耶諸人聞經至此是聞耶非聞耶善智識苟有不聞而聞者方會清庵無說之說恁麼則聖人作經之意明矣起初一句至矣盡矣休更疑惑或曰道既不可道名既不可名今日大作法事莫非多事乎曰不然太上二月十五日降誕非真也顯生生之義也豫今與太上慶誕正欲發明起初一句也何多事之有復何疑哉大衆起初一句已自說了末後一句又作麼生咦父母所生口終不為吾通下座放參師曰視之不見名曰希聽之不聞名曰夷摶之不得名曰微此三者不可致詰豫謂視之不見名曰希莫非無色乎聽之不聞名曰夷莫非無聲乎摶之不得名曰微莫非無形乎舉拂子云見麼敲一敲云聞麼若作見聞會未具參學眼不作見聞會亦未具參學眼諸人作麼會默庵出云見色非干色聞聲不是聲色身無礙處親到法王城師曰離却語言默庵堅起拳頭云看打一拳云聽這箇還屬見聞也無師曰敲空作響默庵曰更有麼師曰待汝隱大象於無形潜大音於希聲却來相見默庵曰唯拜謝而退師舉拄杖云泥牛喘月木馬嘶風觀之似有覔無蹤清庵拄杖子畫倒妙高峯又道開口即錯可勞舉似咦若向拄杖下當虛皇的意未夢見在何以故善行無轍迹善言無瑕謫善計不用籌策善閉無關鍵而不可開善結無繩約而不可解頌曰舉步不在腳把物非干手摸著鼻孔尖通身都是口若能於此善參詳七七元來四十九若向這裏會得方知道太上說是經不曾開口清庵舉拄杖不曾動手其或未然且向聲色裏做工夫還有會底麼不得開口不得動手離却聲色出來相見道得也喫棒道不得也喫棒黃居士出方欲開口侍者云不得開口良久踏一踏師云更有在黃咳嗽師曰早遲八刻定庵出拜云請師再舉師曰不得開口定庵堅拳又曰不得動手定庵喝師曰向上更有在定庵曰更有箇甚麼師曰只今座下人衆好向靜處理會師下座定庵隨行師把住云那裏去定庵云無處去師云恁麼去且免喫棒定庵拜謝清庵螢蟾子語録卷之三
