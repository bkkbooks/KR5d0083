front:
  text: 清庵瑩蟾子語録卷之四卑八
  hash: sha256:057c2d36007c32b069ddc0ed2a99744f32df3caf6f3dd65cfd2f8eea527927fd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0083_HFL_004-001a, image: hfl/0729/0729-082.png}
body:
  text: 門弟子寧庵鄧德成編師在維揚作絶句令門人續一句師曰若有合轍者許進一步師曰無形無影亦無名撑柱乾坤古到今剛被清庵掀倒了定庵曰大千沙界總成金無庵曰杳無蹤跡絶追尋復庵曰要知下手定中尋默庵曰變成大地作黃金月庵曰虛無粉碎沒蹤尋師曰除無庵外一狀領過師曰乾鼎金爐烹日月天罡斗柄斡璇璣劈開混沌金丹就定庵曰迸出圓光遍界輝無庵曰抱箇嬰兒謁紫微昔庵曰直謁丹霄不用梯復庵曰服了乘鸞造太微默庵曰認得中間一點輝素庵曰放出光明太始歸師曰諦觀諸子之作皆且且獨默庵曰較些子師曰舉步踏翻無色界擡頭撞倒大羅天有人問我安身處定庵曰透出金剛無礙圈無庵曰一顆珠中納大千復庵曰隱在鴻濛未判前默庵曰無减無增本自然月庵曰只在眉毛眼睫前師曰定庵為上復庵次之師曰歷劫元來一寶珠硬如生鐵軟如酥大千沙界無安處定庵曰包盡乾坤造化模無庵曰道外虛無盡不敷復庵曰照徹虛空一也無普庵曰看見分明覓後無默庵曰遍滿虛空總是渠愛山曰無限清光照太虛師曰都未盡在其間獨定庵默庵較些子師曰著無著有總非功兩下俱捐又落空無有兼資終不一定庵曰無中真有始潜通默庵曰非無非有始圓通無庵曰非無非有顯神通復庵曰太虛同體道方通師曰都較些子豫則曰不如默默守其中師曰圓陀陀地一圍圈産在鴻濛未判前沒蒂沒根無可把定庵曰方明此際是真筌默庵曰現前應用十分全無庵曰要知月落不離天復庵曰寂然不動悟真詮師曰默庵一句可取師曰上柱天兮下柱地中間一竅不通氣視之不見聽無聲定庵曰喫飯著衣常不昧默庵曰應用頭頭皆不離無庵曰拍塞虛空神鬼畏損庵曰却與虛空有何異師曰定庵可取師又曰立鼎燒乾四大海安爐煉碎五須彌金丹成象包三界定庵曰方顯男兒得志時無庵曰道本無為喻有為默庵曰此是先天先地時濟庵曰正是超凡入聖時師曰定庵一句為絶師在昭陽四聖道院與諸法眷煉志今並附于此師曰筆鋒一蘸江湖竭墨梃才磨大地穿拍塞虛空書一畫默庵曰亘今亘古藹雲烟息庵曰毫尖露出本來天退庵曰畫開父母未生前靜庵曰此玄玄外更無玄師曰靜庵退庵較些子退庵一句改作混沌未分前更妙師曰小小庵兒小小蟾潜藏不許外人瞻夜來開放吞天口默庵曰滿腹丹砂火正炎靜庵曰嚼碎方知苦與甜退庵曰大地山河舌下潜一庵曰一味醍醐别樣甜師曰都較些子豫則曰吞盡乾坤尚不厭師曰貧者今年成煞貧庵中無地可容針貧來貧去貧無極默庵曰惟有金丹亘古今濟庵曰徹骨全無一點塵隱庵曰赤條條地本來心虛庵曰脫却皮膚見本心息庵曰煉得乾坤總是金惟庵曰唯有通身是紫金丁宰曰獨有神丹一粒金師曰都未是答曰家破人亡死却心師曰黃婆昨夜養嬰兒才出胞胎體太微混沌之中藏不得默庵曰還他無極以前時息庵曰却來黍米識玄機師曰都是未著答曰太虛之外斡璇璣師曰聞經聞法事難全離法求玄又不然不離不聞都是錯默庵曰一切掀倒始功圓息庵曰饑來喫飯困來眠師曰皆未盡善答曰執中不易是真詮師曰竿頭立底功難就進步如何動腳跟不動腳跟爭得到默庵曰上頭一著妙難論師曰揭開腦蓋去朝元師又曰坐中開眼道難成閉眼元來又屬陰不閉不開真瞎漢默庵曰通身是眼我知音濟庵曰放開一眼覷教親師曰頂門具眼見天心師曰若行陸地涉途程水路來時墮塹坑不涉兩途爭得道默庵曰攔腮一掌太無情息庵曰元來中道坦然平師曰息庵較些子豫則曰乘風歸去謁三清師曰無門關鎖不難參說著無門便沒關既是無關開箇甚默庵曰知他窠臼有何難息庵曰一拳打破透疑團虛庵曰不移一步到長安師曰虛庵可取師曰坐中皆濁總為陰及至惺惺又屬情不散不昏都是垢默庵曰鼓琴招鳳自然清一庵曰萬緣俱泯大丹成東庵曰虛無空寂本乎誠靜安曰全身放下自通靈師曰都缺些子答曰放教自在便光明師曰工夫做到杳冥中守著些兒費了功不守又還成茫蕩默庵曰此身全與太虛同息庵曰息中自有大神通東庵曰全身隱在太虛中一庵曰寂然不動感而通師曰拈來物外逞神通師又曰昨夜三更日正午大蟲吞却南山虎清庵定裏逞神通默庵曰獅子吼時誰敢侮頥庵曰撼動乾坤誰敢侮師曰你兩箇都不識這箇答曰唬得驪龍起來舞師曰水中撈月從來妄火裏栽蓮是脫空撅地尋天多費力默庵曰不離當處闡神通息庵曰無修無證始成功師曰爭如一定守其中又曰天作庵兒地作基四維八極作藩蘺中間有箇癡呆漢默庵曰獨玩天心月上時師曰索性掀翻不住持又曰乾坤未判從無極無極之前本太初未有太初前底事默庵曰渠今非我我非渠息庵曰古今惟我獨如如師曰只今見在體元虛師曰昨宵日午與無寥直上中天旋斗杓運轉法輪天地震默庵曰黍珠宫裏正逍遙又曰森羅萬象悉來朝師曰莫執無心與有心兩心到底不通真有心畢竟心為纍默庵曰會取中間真有因師曰無有雙忘證法身又曰我把殺人手假拈出活人刀子試問殺活如何默庵曰活却從前死底息庵曰斬斷一切生死師曰你兩箇刀子無刃答曰法王法令在此師曰爍爍團團一寶珠外無邊際裏頭虛輕輕拈出無安處默庵曰獨露單提得自如虛庵曰遍周沙界現真如息庵曰放去收來總在渠一庵曰元始於中獨自居師曰你每安得不著下著咦引我蟾蜍裏面居又曰煉就通紅熱鐵丸紅如杲日大如天鉗來送入諸人口默庵曰嚼出清涼一味禪息庵曰嚼碎方知滋味全師曰爛盡肝腸性始堅師曰豫與諸法眷續詩游戲豫之本意不在詩而在道苟有以詩會道者無上至正之妙得矣今以挽邪歸正為題押爺遮韻作一絶句證不許犯題默庵曰堪笑迷徒不認家唤他假老作親爺默庵伸出無為手直指長安無障遮實庵曰曲徑傍蹊數百家人人錯認賊為爺我今唤得回頭了方信蓬萊路不遮甲庵曰三千小法眼前花切莫迷漫唤作爺驀鼻拖回歸大道滿天明月沒雲遮師曰抱賊叫屈實堪嗟兩眼明明不識爺莫怪清庵施毒手打開心孔要無遮清庵螢蟾子語録卷之四
