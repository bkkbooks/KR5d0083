front:
  text: 清庵瑩蟾子語録卷之五卑九
  hash: sha256:923d063f189604829be72983737a5defdc7e0b75bca8e547274c497c02e0a794
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0083_HFL_005-001a, image: hfl/0729/0729-096.png}
body:
  text: 門弟子蒙庵張應坦編雜述詩贈東溪丹道立基處休教外境侵一心纔靜定二物互相任離火燒鉛汞雷車運水金調和藉坤土灌溉必天壬白雪凝金鼎黄芽長玉簮這些眞種子本不是玄參又會得潜心妙從他二鼠侵有人信得及無箇力難任慈誓弘如海機鋒利似金窮通内子午掀倒外丁壬善閉無關鍵勿疑朋盍簪玄之又玄處一唯契曾參韓宰求賛吕祖師這箇吕老面善心黑兀兀騰騰飄飄逸逸劔佩青蛇丹傳紫極校勘將來分明竒特奇特一句又作麽生咄袖中神劔不露鋒鋩宇宙縱横了無人識王居士求賛寳公頂相這箇和尚拗服背棒三十六場做盡模様咦直待擘破面皮露出裏頭端相張居士求賛布袋和尚這箇胖漢慣會做賊布袋中蔵了無人識咦自是賊人心下虛笑中露出眞消息李居士求賛吕公箇樣鬍漢是何像態兀兀騰騰捏捏恠恠寄迹紅塵遨遊物外既到這裏私贜盡敗且道賊在甚處咄袖内隱青蛇粟中藏世界善友求賛王祖師這箇老叟形容大醜髮少如鬚眼大似口自稱是五祖兒孫人唤作七眞師友且道如何即是看更問如何劈脊便摟趙居士求賛三仙圖祖師清庵黄胖黄胖全不似像百無一能受人供養還識眞底麽爲伊劈破面皮却與虛空一樣潔庵措大指大千喬百恠讀五車書一字不會且道云何不會咄脫却鮑老戲衫博箇金剛不壞賛諸法眷了蟾頌曰心月圓明性天朗耀迸出了蟾乾坤普照嘿庵頌曰嘿庵境界無内無外廣納包容含弘光大丹蟾頌曰丹爲蟾用蟾爲丹體丹成蟾蛻功齊元始一蟾頌曰禪天瑩靜慧海澄清一蟾突出普照無情咄乾坤百拶碎獨露大光明頥庵頌曰頥庵境界無罣無礙九轉功成靈胎脫蛻咦頂門放大光明遍照三千世界賛李待詔剔聦正容披雲修月向上工夫一切漏泄咦至士面前呈手段到頭萬法一齊通賛錢待詔玉掠撥開雲金刀修出月上頭些子機一切都通徹咦面前消息子不聞中露泄雜頌題三境圖看這一箇拙漢全無些子果斷分明半死半活猶自厮纏斯絆咦連忙急走回來也只救得一半題打坐猿這箇畜生顛劣忒煞突出眼睛野性猶在咄直須爛了皮毛物外縱横無礙題閉目猿咄這毛團是何相態一味顛狂千般捏恠既到這裏和贜捉敗且道贜在甚處咦瞑心瞑目坐山巔全炁全神遊物外賛黑殺符虛空爲紙須彌作筆盡就靈符神出鬼没試問煞活如何聻賛劔殺人刀子横拈倒舉逢佛殺佛逢鬼殺鬼賛燒餅水麪和成一塊做出圓陀陀地不因火候工夫爭得箇般眞味咄信手拈出向君不用牙關嚼碎賛餳糖絞出黄芽汁煎熬憑火力黏如鸞鳳膠甜似波羅蜜懵懂拙漢黏却牙關大力量人開口不得賛瓢禀賦先天一炁成就箇般道器拈來信手劈開渾淪圓陀陀地咦舉起分明切忌錯會又云只這一箇把柄妙用神功莫測舉起蓋日遮天放下風恬浪息賛宗髼頭髼頭髼頭有甚風流横拖拄杖倒騎鐵牛自賛眞相這箇面觜不傍道理那箇尚非何嘗有你咦唤作李清庵便是眼見鬼賛扇圓陀陀地一片直下森羅影現舉起明月當天摇動清風拂面且道見也不見咦休問見也不見爲伊略通一線搧一扇賛丹亘古此物無形無質無欠無餘無休無息其利斷金其圓勝日釋曰玄珠儒曰太極道曰金丹名三體一只在目前時人不識只這便是休更疑惑示衆二圖疊脫蛻元形保精字成丹神鍊氣禦藏久視存神生長定性頭形固氣靈心明頌凝精住神本悟釋頌元神鍊形鍊形保精保精禦氣禦氣神存神存定性定性明心明心悟本悟本神靈神靈氣住氣住精凝精凝形固形固長生長生久視久視丹成丹成脫蛻脫蛻元神右此頌乃煉神之要也欲煉其神先煉其精欲煉其精先禦其炁欲禦其炁必先存守存守得定則心所以明神所以靈炁所以住也炁住而後精凝精凝而後形固形固而陽神脫蛻長生久視之道盡矣丹書所謂金液煉形金液還丹並不外乎此釋圖律詩八金釜内煉丹時丹煉八者木之成數也木性也金情釜也以性攝情入于中宫喻曰土時内釜然後加火煉之愈煉愈堅固愈煉愈圓明故喻之曰金丹也户火爐中要謹持謹要火者神也户者室也元神入室爐如藥在爐切宜謹謹固濟勿令持中差失鈆汞二物惟好飛走可不謹乎毫髮差殊不作丹者是也欠土坎宫壬癸走土者坤也坤屬身身不動則虎癸壬嘯身動則虎走虎嘯則精凝虎坎走則精洩欠土者身不定也壬走宫癸走者精洩也學者不可不謹心生性地丙丁飛丙丁火也屬心心定則龍吟心不丙丁定則龍奔龍吟則炁固龍奔則炁性散心生者火炎也丙丁飛者氣散飛地也此二句喻鈆飛汞走之意也主人住處陰魔伏主人者本來眞如之性也歷劫魔陰不壞元神也住者元神入室也住陰魔伏者情欲絶也學道底人伏處身心既不動則神凝氣固矣日月明時至寳輝日月喻身之精華也明寳至者精華凝結也功深力明到煉成一塊至寶放光輝時輝照天爍地也一二三元成混合混成天一生水精也地二生三火氣也天三生木神也合元精氣神煉成一塊三五合一返本還元金公鈆死抱嬰兒嬰抱金邊着箇公字鈆也鈆鈆死者欲海竭也情兒死念絶也聖胎成也嬰兒顯象也一鈆二汞會三宫一者水之生數喻精也强名曰鈆會汞二者火之生數喻氣也强名曰三砂三者木之生數喻神也强名宫鈆曰汞三宫者三元所居之宫也東海金公百煉工百公東海喻性也金公喻鍊情也即是鈆汞之異工海名情來歸性以火煉百煉工夫方爲至寶身内本元爲體用爲元自家身内有天然種子體向外求之者謬矣身内用内元精金丹之用也心中元氣金丹之體也艮宫木液是根宗是液艮宫即土也木液即汞根也總名曰砂中汞金丹宗宫之母也恐學者無以取則故强名云日居月窟眞明了日居月窟者陽來陰舍眞窟也取坎填離也抽鈆添明汞也嬰兒交姹女也金了居木併也水火交也心死神生慧性通心死則神生神生則慧慧神通故學道之人身如朽性木心若死灰寂然不動通死工夫純熟慧性圓明工備水乾鈆汞結工夫周竟則欲海自竭鈆乾性情混融則汞鈆交結汞火候功成則形神超越結備然後金丹形兆也大丹一粒透天紅大丹者大至圓也非透粒假外物由本來眞如天之本而煉成人還得紅丹餌果證金仙矣學道先明三二一學明三二一者即神炁精也三即非交合之精呼吸之道先炁思慮之神乃元精元炁元神也不可不明行工莫縱性生心行縱行工之際不可縱心性心生則火炎上心定工莫則無明息十二時中常常檢攝時人若信吾言語學道之人執文泥象時信終不自明老子云吾語言甚易行世人莫能人若知莫能行信不及也打併乾坤住主人打坤乾坤身心也信得及住底打併身心認本來併乾面目苟或覿面相逢决定無來無去也坎水揚波因欠土波揚坎水揚波者精不坎住也欠土者身不因水定也丹書云眞土制眞鈆即此也性天起念爲生心念起性天起念者情動性於中也生心者散爲天亂也丹書云眞鈆制眞汞即此也汞爐立定須工水定立安爐立鼎必先固其精汞故曰先工水也精固則須爐炁凝鈆汞自結也丹書云鈆汞歸土釜釜内調和煉八金和調八金者情性也釜爲釜黄中也性情歸中身煉内心湛寂丹書云身心寂不動即此也垂目睡時工水汞行工之際睡魔相撓睡時汞水中取火而攻之自心息定煉東金身心不動金木交併息定煉一性圓明萬縁息車由軸動吾心悟車動由軸人動由心軸動悟人明此理即全眞一二三宫日月明三元合一二物圓成三宫明明如日月爍乾坤蒙庵曰清庵師作此疊字藏頭二圖非尚竒巧也蓋欲發明金丹之體用顯微無間也疊字頌謂丹體也蔵頭詩謂丹用也藏頭之意表丹道之微宻也自釋其詳表丹㫖之顯明也苟有觀圖得㫖者金丹之能事畢矣於是模之于集後與同志共之清庵瑩蟾子語録卷之五
